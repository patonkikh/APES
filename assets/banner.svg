      <stop offset="0.5" stop-color="#818cf8" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#38bdf8"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="320" rx="16" fill="url(#bg)"/>
  <rect width="1200" height="320" rx="16" fill="url(#accent)"/>
  <circle cx="100" cy="80" r="120" fill="#38bdf8" fill-opacity="0.06"/>
  <circle cx="1100" cy="240" r="140" fill="#34d399" fill-opacity="0.06"/>
  <circle cx="600" cy="160" r="200" fill="#818cf8" fill-opacity="0.04"/>
